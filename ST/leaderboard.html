<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SegriTrack | Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --main-green: #01f386; --dark-green: #004d37; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .navbar { background: white !important; border-bottom: 1px solid #edf2f7; }
        .nav-link { color: #4a5568 !important; font-weight: 500; }
        .nav-link.active { color: var(--dark-green) !important; font-weight: 700; border-bottom: 2px solid var(--main-green); }
        .profile-circle { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-green); margin-left: 10px; }
        .podium-container { display: flex; align-items: flex-end; justify-content: center; margin: 40px 0; gap: 10px; }
        .podium-item { text-align: center; width: 110px; }
        .avatar-icon { font-size: 4rem; color: #cbd5e1; margin-bottom: 10px; display: block; }
        .reward-tag { font-size: 0.8rem; font-weight: bold; color: var(--dark-green); background: var(--main-green); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 5px; }
        .leaderboard-list { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; }
        .user-rank-sticky { position: sticky; bottom: 0; background: var(--dark-green); color: white; padding: 15px 0; z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .footer-dark { background: #002e21; color: #888; padding: 40px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-success fs-3" href="home.html">🌱 SegriTrack</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="leaderboard.html">Leaderboard</a></li>
                <li class="nav-item d-flex align-items-center">
                    <a class="nav-link" href="profile.html">Profile</a>
                    <a href="profile.html"><img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png" class="profile-circle shadow-sm"></a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pt-5">
    <h2 class="text-center fw-bold mb-4">Top Waste Warriors</h2>

    <div class="podium-container">
        <div class="podium-item">
            <i class="bi bi-person-circle avatar-icon"></i>
            <div class="fw-bold small">User 2</div>
            <div class="text-success small fw-bold">540 Pts</div>
            <div class="reward-tag">₹500</div>
        </div>
        <div class="podium-item" style="transform: scale(1.1);">
            <i class="bi bi-person-circle avatar-icon text-warning"></i>
            <div class="fw-bold">User 1</div>
            <div class="text-success small fw-bold">585 Pts</div>
            <div class="reward-tag">₹1,000</div>
        </div>
        <div class="podium-item">
            <i class="bi bi-person-circle avatar-icon"></i>
            <div class="fw-bold small">User 3</div>
            <div class="text-success small fw-bold">510 Pts</div>
            <div class="reward-tag">₹250</div>
        </div>
    </div>

    <div class="leaderboard-list mb-4">
        <script>
            for (let i = 4; i <= 20; i++) {
                const pts = 500 - (i * 12);
                document.write(`
                    <div class="list-item">
                        <div class="fw-bold me-3 text-muted" style="width: 30px;">${i}</div>
                        <div class="flex-grow-1 d-flex align-items-center">
                            <i class="bi bi-person-circle fs-4 me-2 opacity-25"></i>
                            <span>User ${i}</span>
                        </div>
                        <div class="fw-bold text-success">${pts} Pts</div>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<div class="user-rank-sticky">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <span class="fw-bold me-3">#28</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png" width="30" class="rounded-circle me-2">
            <span class="fw-bold">Your Current Rank</span>
        </div>
        <div class="fw-bold">170 Points</div>
    </div>
</div>

<footer class="footer-dark text-center"><p class="small mb-0">&copy; 2026 SegriTrack India.</p></footer>
</body>
</html>
