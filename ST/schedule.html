<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack | Schedule Pickup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --main-green: #01f386; --dark-green: #004d37; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        /* Navigation */
        .navbar { background: white !important; border-bottom: 1px solid #edf2f7; }
        .nav-link { color: #4a5568 !important; font-weight: 500; }
        .nav-link.active { color: var(--dark-green) !important; font-weight: 700; border-bottom: 2px solid var(--main-green); }
        .profile-circle { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-green); margin-left: 10px; }

        /* Schedule Card */
        .schedule-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .address-display { background: #f1f5f9; border-radius: 12px; padding: 15px; border-left: 4px solid var(--dark-green); }
        .map-placeholder { height: 200px; background: #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #64748b; }
        
        /* Toggle Customization */
        .btn-check:checked + .btn-outline-success { background-color: var(--dark-green) !important; color: white !important; }
        .btn-outline-success { color: var(--dark-green); border-color: var(--dark-green); }

        /* Confirmation Overlay */
        .success-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); z-index: 2000; text-align: center; padding-top: 10%; 
        }
        .footer-dark { background: #002e21; color: #888; padding: 40px 0; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-success fs-3" href="home.html">🌱 SegriTrack</a>
        <div class="collapse navbar-collapse" id="dashNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="leaderboard.html">Leaderboard</a></li>
                <li class="nav-item d-flex align-items-center">
                    <a class="nav-link" href="profile.html">Profile</a>
                    <img src="https://via.placeholder.com/150" alt="User" class="profile-circle">
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4 text-center">Schedule Pickup</h2>
    
    <div class="btn-group w-100 mb-4 shadow-sm">
        <input type="radio" class="btn-check" name="pickupMode" id="defaultMode" checked>
        <label class="btn btn-outline-success py-3 fw-bold" for="defaultMode" onclick="switchView('default')">Default Pickup</label>

        <input type="radio" class="btn-check" name="pickupMode" id="specialMode">
        <label class="btn btn-outline-success py-3 fw-bold" for="specialMode" onclick="switchView('special')">Special Pickup</label>
    </div>

    <div class="schedule-card p-4">
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PICKUP DATE</label>
                <input type="date" class="form-control mb-4 border-0 bg-light py-2" id="pickupDate">
                
                <label class="form-label fw-bold small text-muted">TIME SLOT</label>
                <select class="form-select border-0 bg-light py-2">
                    <option>Morning (08:00 AM - 10:00 AM)</option>
                    <option>Afternoon (02:00 PM - 04:00 PM)</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PICKUP ADDRESS</label>
                <div id="defaultView">
                    <div class="address-display">
                        <p class="mb-1 fw-bold text-dark">Default Home Address</p>
                        <p class="small text-muted mb-0">123, Green Lane, MyCity, Kerala</p>
                    </div>
                </div>
                <div id="specialView" style="display:none;">
                    <div class="map-placeholder mb-2">
                        <i class="bi bi-pin-map-fill me-2"></i> Select Location on Map
                    </div>
                    <p class="small text-danger fw-bold">Note: Special Fee of ₹50 applies.</p>
                </div>
            </div>
        </div>
        <button class="btn btn-success w-100 mt-5 py-3 fw-bold" style="background-color: var(--dark-green); border: none;" onclick="confirmSchedule()">Confirm Schedule</button>
    </div>
</div>

<div id="confirmOverlay" class="success-overlay">
    <div>
        <div class="display-1 text-success mb-3">✅</div>
        <h2 class="fw-bold">Pickup Scheduled!</h2>
        <div class="p-3 bg-light d-inline-block rounded-3 my-4 border">
            <span class="text-muted small">PICKUP ID: </span><span id="genID" class="fw-bold">#ST-XXXXX</span>
        </div>
        <div class="d-flex justify-content-center gap-3">
            <button class="btn btn-outline-success px-4" onclick="location.href='home.html'">Home</button>
            <button class="btn btn-success px-4" style="background-color: var(--dark-green); border: none;" onclick="location.href='track.html'">Track Now</button>
        </div>
    </div>
</div>

<footer class="footer-dark text-center">
    <div class="container">
        <p class="mb-1">🌱 SegriTrack India</p>
        <p class="small mb-0">&copy; 2026. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. Unified Switch View Function
    function switchView(mode) {
        const defDiv = document.getElementById('defaultView');
        const specDiv = document.getElementById('specialView');
        const defRadio = document.getElementById('defaultMode');
        const specRadio = document.getElementById('specialMode');

        if(mode === 'default') {
            defDiv.style.display = 'block';
            specDiv.style.display = 'none';
            defRadio.checked = true;
        } else {
            defDiv.style.display = 'none';
            specDiv.style.display = 'block';
            specRadio.checked = true;
        }
    }

    // 2. Critical Fix: Detect "Special" mode immediately on load
    document.addEventListener('DOMContentLoaded', function() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'special') {
            switchView('special');
        }
    });

    function confirmSchedule() {
        document.getElementById('genID').innerText = "#ST-" + Math.floor(10000 + Math.random() * 90000);
        document.getElementById('confirmOverlay').style.display = 'block';
    }
</script>
</body>
</html>
