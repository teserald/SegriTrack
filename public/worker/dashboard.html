<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --neon-glow: 0 0 15px rgba(1, 243, 134, 0.4);
        }

        body {
            background: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            padding-bottom: 120px;
            color: #1e293b;
        }

        /* Glassmorphism Header */
        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Toggle Button Premium */
        #toggleBtn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        #toggleBtn.btn-light {
            background: var(--main-green);
            color: var(--dark-green) !important;
            border-color: var(--main-green);
            box-shadow: var(--neon-glow);
        }

        /* Stats Cards Glass */
        .stats-header {
            background: linear-gradient(180deg, rgba(0, 77, 55, 0.1) 0%, rgba(240, 244, 248, 1) 100%);
            padding: 40px 0 20px;
            margin-bottom: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        /* Active Task Premium */
        .active-task-wrapper {
            animation: slideUp 0.6s ease-out;
        }

        .active-card {
            background: white;
            border-radius: 28px;
            border: none;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .active-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 8px;
            background: linear-gradient(to bottom, var(--main-green), var(--dark-green));
        }

        /* Pickup Cards List */
        .pickup-card {
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 20px;
            background: white;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .pickup-card:hover {
            transform: translateX(8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: linear-gradient(90deg, #ffffff 0%, #f7fffb 100%);
            border-color: var(--main-green);
        }

        /* Bottom Nav Premium */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex;
            padding: 12px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .nav-item-bottom {
            flex: 1;
            text-align: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-item-bottom i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item-bottom.active {
            color: var(--dark-green);
        }

        .nav-item-bottom:hover {
            color: var(--main-green);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="position-relative me-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png"
                        class="rounded-circle border border-2 border-white border-opacity-25"
                        style="width: 45px; height: 45px; object-fit: cover;">
                    <div class="position-absolute bottom-0 end-0 bg-success rounded-circle border border-2 border-dark"
                        style="width: 12px; height: 12px;"></div>
                </div>
                <div>
                    <span class="navbar-brand fw-bold mb-0 fs-4 d-block lh-1 text-white">SegriTrack</span>
                    <small class="text-white-50 fw-semibold" style="font-size: 0.75rem; letter-spacing: 0.5px;">OFFICIAL
                        PARTNER</small>
                </div>
            </div>
            <button id="toggleBtn" class="btn btn-outline-light rounded-pill px-4 fw-bold shadow-lg"
                onclick="toggleStatus()">
                <i class="bi bi-power me-2"></i>GO ONLINE
            </button>
        </div>
    </nav>

    <!-- Premium Stats Header -->
    <div class="stats-header">
        <div class="container">
            <div class="row g-3">
                <div class="col-4">
                    <div class="glass-card text-center h-100">
                        <i class="bi bi-list-check text-primary mb-2 d-inline-block fs-4"></i>
                        <h4 class="fw-bold mb-0 text-dark" id="statTasks">--</h4>
                        <small class="text-muted fw-bold" style="font-size: 0.65rem;">TASKS</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="glass-card text-center h-100">
                        <i class="bi bi-wallet2 text-success mb-2 d-inline-block fs-4"></i>
                        <h4 class="fw-bold mb-0" style="color: #059669;">₹140</h4>
                        <small class="text-muted fw-bold" style="font-size: 0.65rem;">EARNINGS</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="glass-card text-center h-100">
                        <i class="bi bi-lightning-charge text-warning mb-2 d-inline-block fs-4"></i>
                        <h4 class="fw-bold mb-0 text-dark">4.2<small class="fs-6 fw-normal">km</small></h4>
                        <small class="text-muted fw-bold" style="font-size: 0.65rem;">RANGE</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container px-4 pb-5 mb-5 overflow-hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0 text-dark" style="letter-spacing: -0.5px;">Active Route</h5>
            <a href="map.html"
                class="btn btn-white bg-white text-dark fw-bold rounded-pill px-3 shadow-sm border border-light"
                style="font-size: 0.85rem;">
                <i class="bi bi-compass-fill text-success me-1"></i> Full Map
            </a>
        </div>

        <!-- Active Task Section -->
        <div id="activeTaskContainer" class="active-task-wrapper">
            <div class="text-center text-muted py-5 glass-card">
                <div class="spinner-border spinner-border-sm text-success me-2"></div>
                Initializing your route...
            </div>
        </div>

        <!-- Upcoming Tasks -->
        <div class="mt-5 mb-4">
            <h6 class="text-muted fw-bold small text-uppercase" style="letter-spacing: 1.5px;">Queue (<span
                    id="upcomingCount">0</span>)</h6>
        </div>

        <div id="pickupList" class="pb-5">
            <div class="text-center text-muted py-3">Scanning for nearby jobs...</div>
        </div>
    </div>

    <!-- Premium Action Modal -->
    <div class="modal fade" id="actionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content border-0 shadow-lg"
                style="border-radius: 30px; overflow: hidden; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <div>
                        <h5 class="modal-title fw-bold fs-3 text-dark mb-0" style="letter-spacing: -1px;">Process Job
                        </h5>
                        <p class="text-muted small mb-0">Complete the steps below</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <div class="text-center mb-4 bg-white p-4 rounded-4 border border-light shadow-sm">
                        <div class="d-inline-block mb-3 p-3 bg-success bg-opacity-10 rounded-circle">
                            <i class="bi bi-qr-code-scan text-success" style="font-size: 2.5rem;"></i>
                        </div>
                        <h6 class="fw-bold mb-1">Verify User</h6>
                        <p class="text-muted small mb-3">Scan the user's QR code to confirm pickup</p>
                        <div id="qr-reader"
                            style="display:none; width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px;">
                        </div>
                        <div id="qr-status" class="alert alert-info py-2 small mb-3" style="display:none;"></div>

                        <button class="btn btn-dark w-100 py-3 rounded-pill shadow-sm fw-bold" onclick="startScanner()"
                            id="scannerBtn"><i class="bi bi-camera-fill me-2"></i> Launch Scanner</button>
                    </div>

                    <div class="bg-white p-4 rounded-4 border border-light shadow-sm mb-4">
                        <h6 class="fw-bold mb-3 d-flex align-items-center">
                            <i class="bi bi-stars text-warning me-2"></i> Quality Grade
                        </h6>
                        <div class="row g-2">
                            <div class="col-4"><button
                                    class="btn btn-outline-success w-100 py-2 rounded-4 small fw-bold"
                                    onclick="setQuality(this)">Excellent</button></div>
                            <div class="col-4"><button
                                    class="btn btn-outline-primary w-100 py-2 rounded-4 small fw-bold"
                                    onclick="setQuality(this)">Good</button></div>
                            <div class="col-4"><button
                                    class="btn btn-outline-warning w-100 py-2 rounded-4 small fw-bold"
                                    onclick="setQuality(this)">Average</button></div>
                            <div class="col-6"><button class="btn btn-outline-danger w-100 py-2 rounded-4 small fw-bold"
                                    onclick="setQuality(this)">Poor</button></div>
                            <div class="col-6"><button
                                    class="btn btn-outline-secondary w-100 py-2 rounded-4 small fw-bold"
                                    onclick="setQuality(this)">Mixed</button></div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 py-3 fw-bold fs-5 rounded-pill shadow-lg border-0" disabled
                        id="completeBtn"
                        style="background: linear-gradient(135deg, var(--main-green) 0%, var(--dark-green) 100%) !important;">
                        FINISH JOB
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Premium Bottom Nav -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item-bottom active">
            <i class="bi bi-grid-1x2"></i>
            <span>Board</span>
        </a>
        <a href="map.html" class="nav-item-bottom">
            <i class="bi bi-map-fill"></i>
            <span>Route</span>
        </a>
        <a href="history.html" class="nav-item-bottom">
            <i class="bi bi-layers"></i>
            <span>History</span>
        </a>
        <a href="profile.html" class="nav-item-bottom">
            <i class="bi bi-person-circle"></i>
            <span>Me</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script id="socketScript"></script>
    <script>
        // Use port 3000 if we are on Live Server (port 5500)
        const API_BASE = (window.location.port === '5500' || window.location.port === '5501') ? 'http://localhost:3000' : '';

        // Dynamically load socket.io script from the correct port
        document.getElementById('socketScript').src = API_BASE + '/socket.io/socket.io.js';

        let isOnline = false;
        let socket;
        let locationInterval;
        let currentPickupId = null;
        let modal;

        // Initialize Socket
        try {
            // Wait a tiny bit for the script to load if it was dynamic
            setTimeout(() => {
                if (typeof io !== 'undefined') {
                    socket = io(API_BASE);
                    console.log("Socket connected to:", API_BASE || "window.origin");
                } else {
                    console.error("Socket.io script failed to load. Are you on port 3000?");
                }
            }, 500);
        } catch (e) { console.error("Socket error", e); }

        // ===== ON PAGE LOAD =====
        document.addEventListener('DOMContentLoaded', () => {
            console.log("DOM loaded");

            // Init modal safely inside DOMContentLoaded
            try {
                modal = new bootstrap.Modal(document.getElementById('actionModal'));
            } catch (e) { console.error("Modal init error:", e); }

            // Set up complete button
            const completeBtn = document.getElementById('completeBtn');
            if (completeBtn) {
                completeBtn.addEventListener('click', handleComplete);
            }

            fetchPickups();
            initializeWorkerStatus();
        });

        // ===== WORKER STATUS INIT =====
        async function initializeWorkerStatus() {
            const workerId = localStorage.getItem('workerId');
            console.log("initializeWorkerStatus - workerId:", workerId);
            if (!workerId) {
                console.warn("No workerId in localStorage. Did you login via demo?");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/worker/${workerId}/status`);
                if (res.ok) {
                    const data = await res.json();
                    console.log("Worker DB status:", data.status);
                    if (data.status === 'active' || data.status === 'on-route') {
                        // Worker is active in DB, set UI to online
                        setOnline(workerId);
                    }
                }
            } catch (e) {
                console.error("Error fetching worker status", e);
            }
        }

        // ===== FETCH PICKUPS =====
        async function fetchPickups() {
            try {
                const res = await fetch(`${API_BASE}/api/pickup/assigned`);
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                const pickups = await res.json();
                console.log("Fetched Pickups:", pickups);

                const activeContainer = document.getElementById('activeTaskContainer');
                const listContainer = document.getElementById('pickupList');

                document.getElementById('statTasks').innerText = pickups.length;

                if (pickups.length === 0) {
                    activeContainer.innerHTML = `
    <div class="card border-0 shadow-sm p-5 text-center bg-white rounded-4">
        <i class="bi bi-check-circle text-success opacity-50 mb-3" style="font-size: 4rem;"></i>
        <h4 class="fw-bold text-dark mb-1">Queue Empty</h4>
        <p class="text-muted small">You have no active pickups waiting.</p>
    </div>`;
                    listContainer.innerHTML = '';
                    document.getElementById('upcomingCount').innerText = '0';
                    return;
                }

                const activeTask = pickups[0];
                const upcomingTasks = pickups.slice(1);

                document.getElementById('upcomingCount').innerText = upcomingTasks.length;

                const targetTime = activeTask.slot || 'ASAP';

                const wasteTypeBadge = activeTask.type === 'special' ?
                    '<span class="badge bg-warning text-dark"><i class="bi bi-box-seam me-1"></i> Special</span>' :
                    '<span class="badge bg-light text-dark border"><i class="bi bi-trash me-1"></i> Default</span>';

                activeContainer.innerHTML = `
    <div class="active-card shadow-lg mb-3 p-3 position-relative" style="background: linear-gradient(145deg, #ffffff, #fcfdfc);">
        <div class="position-absolute top-0 end-0 mt-2 me-2">
            <span class="badge bg-dark rounded-pill px-2 py-1 border-0 opacity-50" style="font-size: 0.6rem; letter-spacing: 0.5px;">#${activeTask.qrCode || '101'}</span>
        </div>

        <div class="d-flex align-items-center mb-2 mt-1">
            <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm me-2"
                style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--main-green) 0%, var(--dark-green) 100%) !important;">
                <i class="bi bi-geo-alt-fill fs-6"></i>
            </div>
            <div>
                <span class="fw-bold text-success d-block lh-1 mb-0" style="font-size: 0.65rem; letter-spacing: 1px;">ACTIVE TASK</span>
            </div>
        </div>

        <h4 class="fw-bold mb-2 text-dark" style="letter-spacing: -0.5px; line-height: 1.1; font-size: 1.25rem;">${activeTask.location?.address || 'Address Not Provided'}</h4>
        
        <div class="d-flex gap-2 mb-3">
            <div class="glass-card py-1 px-2 d-flex align-items-center bg-white border border-light" style="border-radius: 10px;">
                <i class="bi bi-box-seam me-1 text-primary small"></i>
                <span class="fw-bold" style="font-size: 0.7rem;">${activeTask.type === 'special' ? 'Special' : 'Standard'}</span>
            </div>
            <div class="glass-card py-1 px-2 d-flex align-items-center bg-white border border-light" style="border-radius: 10px;">
                <i class="bi bi-clock me-1 text-danger small"></i>
                <span class="fw-bold" style="font-size: 0.7rem;">${targetTime}</span>
            </div>
        </div>

        <div class="d-flex gap-2 mt-3 pt-2 border-top border-light">
            <button class="btn btn-outline-dark py-2 px-3 fw-bold rounded-3 shadow-sm"
                onclick="event.stopPropagation(); window.location.href='map.html'" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-cursor-fill text-primary"></i>
            </button>
            <button class="btn btn-action flex-grow-1 py-2 fw-bold rounded-3 shadow-lg text-dark d-flex align-items-center justify-content-center"
                onclick="openAction('${activeTask._id}')" style="background: var(--main-green) !important; color: var(--dark-green) !important; font-size: 0.9rem;">
                <i class="bi bi-check2-circle-fill me-2"></i> ARRIVED
            </button>
        </div>
    </div>
    `;

                if (upcomingTasks.length === 0) {
                    listContainer.innerHTML = `<div class="glass-card text-center text-muted py-4 small mt-2">No more tasks queued for today. Enjoy your break!</div>`;
                } else {
                    listContainer.innerHTML = upcomingTasks.map((p, index) => `
    <div class="pickup-card p-3 shadow-sm" onclick="openAction('${p._id}')">
        <div class="d-flex align-items-center">
            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3 fw-bold border border-white shadow-sm"
                style="width: 50px; height: 50px; font-size: 1.2rem; background: #f8fafc !important;">
                ${index + 2}
            </div>
            <div class="flex-grow-1">
                <h6 class="fw-bold mb-1 text-truncate text-dark" style="max-width: 220px; letter-spacing: -0.3px;">${p.location?.address || 'Unknown'}</h6>
                <div class="d-flex gap-2 align-items-center">
                    <span class="badge bg-light text-muted fw-bold border-0 p-0" style="font-size: 0.7rem;">
                        <i class="bi bi-upc-scan me-1"></i>${p.qrCode || '---'}
                    </span>
                    <span class="text-muted opacity-25">•</span>
                    <span class="badge bg-light text-dark fw-bold border-0 p-0" style="font-size: 0.7rem;">
                        <i class="bi bi-clock-fill me-1 opacity-50"></i>${p.slot || 'ASAP'}
                    </span>
                </div>
            </div>
            <div>
                <button class="btn btn-light btn-sm rounded-circle border-0 shadow-sm" style="width: 32px; height: 32px;">
                    <i class="bi bi-chevron-right text-muted"></i>
                </button>
            </div>
        </div>
    </div>
    `).join('');
                }

            } catch (e) {
                console.error("Fetch error", e);
                document.getElementById('activeTaskContainer').innerHTML = "<div class='alert alert-danger'>Error loading tasks.</div>";
            }
        }

        // ===== MODAL & QUALITY =====
        let selectedQuality = '';

        function openAction(id) {
            currentPickupId = id;
            if (modal) modal.show();
        }

        function setQuality(btn) {
            document.querySelectorAll('.btn-outline-success, .btn-outline-primary, .btn-outline-warning, .btn-outline-danger, .btn-outline-secondary').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedQuality = btn.innerText;
            document.getElementById('completeBtn').disabled = false;
        }

        async function handleComplete() {
            if (!currentPickupId || !selectedQuality) return;
            try {
                const res = await fetch(`${API_BASE}/api/pickup/${currentPickupId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: 'completed',
                        segregationDetails: { quality: selectedQuality }
                    })
                });
                if (res.ok) {
                    alert('Pickup Completed!');
                    if (modal) modal.hide();
                    fetchPickups();
                }
            } catch (e) {
                alert('Error updating status');
            }
        }

        // ===== TOGGLE ONLINE/OFFLINE =====
        function toggleStatus() {
            const btn = document.getElementById('toggleBtn');
            if (!btn) {
                alert("ERROR: toggleBtn element not found in DOM!");
                return;
            }

            const workerId = localStorage.getItem('workerId');
            console.log("toggleStatus called. isOnline:", isOnline, "workerId:", workerId);

            if (!workerId) {
                alert("No Worker ID found. Please login via the demo login page first.");
                return;
            }

            if (isOnline) {
                setOffline(workerId);
            } else {
                setOnline(workerId);
            }
        }

        async function setOnline(workerId) {
            const url = `${API_BASE}/api/worker/${workerId}/status`;
            console.log("setOnline: Calling PUT", url);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isOnline: true })
                });
                console.log("setOnline response status:", res.status);
                const text = await res.text();
                console.log("setOnline response body:", text);

                if (!res.ok) {
                    alert("Server error going online: " + res.status + " - " + text);
                    return;
                }

                // Success — update UI
                isOnline = true;
                const btn = document.getElementById('toggleBtn');
                if (btn) {
                    btn.innerHTML = '<i class="bi bi-power me-2"></i> ONLINE';
                    btn.classList.remove('btn-outline-light');
                    btn.classList.add('btn-light', 'text-success');
                }
                startLocationSharing(workerId);
                if (socket) socket.emit('workerStatusUpdate', { workerId, isOnline: true });
                console.log("Worker is now ONLINE (DB confirmed)");
            } catch (e) {
                console.error("setOnline FAILED:", e);
                alert("Failed to go online!\nURL: " + url + "\nError: " + e.message);
            }
        }

        async function setOffline(workerId) {
            const url = `${API_BASE}/api/worker/${workerId}/status`;
            console.log("setOffline: Calling PUT", url);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isOnline: false })
                });
                console.log("setOffline response status:", res.status);
                const text = await res.text();
                console.log("setOffline response body:", text);

                if (!res.ok) {
                    alert("Server error going offline: " + res.status + " - " + text);
                    return;
                }

                // Success — update UI
                isOnline = false;
                const btn = document.getElementById('toggleBtn');
                if (btn) {
                    btn.innerHTML = '<i class="bi bi-power me-2"></i> GO ONLINE';
                    btn.classList.add('btn-outline-light');
                    btn.classList.remove('btn-light', 'text-success');
                }
                stopLocationSharing();
                if (socket) socket.emit('workerStatusUpdate', { workerId, isOnline: false });
                console.log("Worker is now OFFLINE (DB confirmed)");
            } catch (e) {
                console.error("setOffline FAILED:", e);
                alert("Failed to go offline!\nURL: " + url + "\nError: " + e.message);
            }
        }

        function startLocationSharing(workerId) {
            if (!socket) return;
            stopLocationSharing(); // Clear any existing interval first
            let lat = 9.158186;
            let lng = 76.773261;

            locationInterval = setInterval(() => {
                lat += (Math.random() - 0.5) * 0.001;
                lng += (Math.random() - 0.5) * 0.001;
                socket.emit('updateLocation', { workerId, lat, lng });
            }, 3000);
        }

        function stopLocationSharing() {
            if (locationInterval) {
                clearInterval(locationInterval);
                locationInterval = null;
            }
        }

        let html5QrCode;

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        }

        async function startScanner() {
            if (!isMobile()) {
                alert("💻 DESKTOP DETECTED\n\nPlease open this dashboard on a mobile phone to use the camera scanner.");
                return;
            }

            const scannerBtn = document.getElementById('scannerBtn');
            const readerDiv = document.getElementById('qr-reader');
            const statusDiv = document.getElementById('qr-status');

            readerDiv.style.display = 'block';
            statusDiv.style.display = 'block';
            statusDiv.innerText = "Initializing camera...";
            scannerBtn.disabled = true;

            html5QrCode = new Html5Qrcode("qr-reader");

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText, decodedResult) => {
                        // Success handle
                        console.log(`Scan result: ${decodedText}`);
                        handleScanSuccess(decodedText);
                    },
                    (errorMessage) => {
                        // parse error, ignore it.
                    }
                );
                statusDiv.innerText = "Point camera at user's QR code";
                statusDiv.classList.replace('alert-info', 'alert-warning');
            } catch (err) {
                console.error("Scanner Error:", err);
                statusDiv.innerText = "Camera error: Use mobile browser with HTTPS";
                statusDiv.classList.replace('alert-info', 'alert-danger');
                scannerBtn.disabled = false;
            }
        }

        function handleScanSuccess(data) {
            // In a real app, verify 'data' matches our currentPickupId's qrCode
            // For demo:
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qr-reader').style.display = 'none';
                    const statusDiv = document.getElementById('qr-status');
                    statusDiv.innerText = "Verification Successful!";
                    statusDiv.classList.replace('alert-warning', 'alert-success');

                    document.querySelector('.bi-qr-code-scan').classList.replace('bi-qr-code-scan', 'bi-check-circle-fill');
                    document.querySelector('.bi-check-circle-fill').classList.add('text-success');

                    // If quality is also set, enable finish
                    if (selectedQuality) {
                        document.getElementById('completeBtn').disabled = false;
                    }
                });
            }
        }
    </script>
