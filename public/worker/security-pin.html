<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack Worker | Security & Pin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            background: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .back-btn {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--main-green);
        }

        .settings-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 25px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .item-icon {
            width: 44px;
            height: 44px;
            background: #f8fafc;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--dark-green);
            margin-right: 18px;
        }

        .form-check-input:checked {
            background-color: var(--main-green);
            border-color: var(--main-green);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark py-3 sticky-top">
        <div class="container d-flex align-items-center">
            <a href="profile.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <span class="navbar-brand fw-bold mb-0 fs-5 text-white" style="letter-spacing: -0.5px;">Security &
                Pin</span>
        </div>
    </nav>

    <div class="container py-4" style="max-width: 600px;">

        <h6 class="fw-bold text-muted small mb-3 ps-2" style="letter-spacing: 1px;">DEVICE SECURITY</h6>
        <div class="settings-list">
            <div class="settings-item" onclick="alert('Change PIN interface')" style="cursor: pointer;">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-asterisk"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Change App Login PIN</div>
                        <div class="small text-muted">Update your 4-digit access code</div>
                    </div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
            <div class="settings-item">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-fingerprint"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Biometric Unlock</div>
                        <div class="small text-muted">Use Face ID / Fingerprint to open app</div>
                    </div>
                </div>
                <div class="form-check form-switch fs-4 mb-0">
                    <input class="form-check-input shadow-none" type="checkbox" role="switch" checked>
                </div>
            </div>
        </div>

        <h6 class="fw-bold text-muted small mb-3 ps-2 mt-4" style="letter-spacing: 1px;">ACCOUNT AUTHORIZATION</h6>
        <div class="settings-list">
            <div class="settings-item">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-geo-alt"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Require Location for Login</div>
                        <div class="small text-muted">Only allow login within approved zones</div>
                    </div>
                </div>
                <div class="form-check form-switch fs-4 mb-0">
                    <input class="form-check-input shadow-none" type="checkbox" role="switch" checked>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
