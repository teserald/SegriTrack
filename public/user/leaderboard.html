<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SegriTrack | Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --neon-glow: 0 0 15px rgba(1, 243, 134, 0.4);
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
        }

        /* Navigation */
        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--main-green) !important;
        }

        .nav-link.active {
            border-bottom: 2px solid var(--main-green);
        }

        .profile-img-nav {
            width: 35px;
            height: 35px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--main-green);
            margin-left: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin: 40px 0;
            gap: 10px;
        }

        .podium-item {
            text-align: center;
            width: 110px;
        }

        .avatar-icon {
            font-size: 3.5rem;
            color: #cbd5e1;
            margin-bottom: 5px;
            display: block;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .podium-block {
            border-radius: 12px 12px 0 0;
            color: white;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 15px;
            box-shadow: inset 0 10px 20px rgba(255, 255, 255, 0.2), 0 -5px 15px rgba(0, 0, 0, 0.1);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .podium-2 {
            height: 120px;
            background: linear-gradient(to top, #94a3b8, #cbd5e1);
        }

        .podium-1 {
            height: 160px;
            background: linear-gradient(to top, #d97706, #fbbf24);
        }

        .podium-3 {
            height: 90px;
            background: linear-gradient(to top, #78350f, #b45309);
        }

        .reward-tag {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--dark-green);
            background: var(--main-green);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 5px;
        }

        .leaderboard-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f8fafc;
            transition: all 0.3s ease;
            cursor: default;
        }

        .list-item:hover {
            background: #f8fafc;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            z-index: 10;
            position: relative;
            border-radius: 12px;
        }

        .user-rank-sticky {
            position: sticky;
            bottom: 0;
            background: var(--dark-green);
            color: white;
            padding: 15px 0;
            z-index: 100;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1);
        }

        .footer-dark {
            background: #002e21;
            color: #888;
            padding: 40px 0;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="home.html">🌱 SegriTrack</a>
            <div class="collapse navbar-collapse" id="dashNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="leaderboard.html">Leaderboard</a></li>
                    <li class="nav-item d-flex align-items-center ms-lg-3">
                        <a class="nav-link" href="profile.html">Profile</a>
                        <a href="profile.html">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png"
                                alt="User" class="profile-img-nav shadow-sm">
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pt-5">
        <h2 class="text-center fw-bold mb-4">Top Warriors</h2>

        <div class="podium-container" id="podiumArea">
            <div class="text-center text-muted py-4 w-100">Loading podium...</div>
        </div>

        <div class="leaderboard-list mb-4">
            <script>
                document.addEventListener('DOMContentLoaded', async () => {
                    const listContainer = document.querySelector('.leaderboard-list');
                    const podiumContainer = document.querySelector('.podium-container');
                    listContainer.innerHTML = '<div class="p-4 text-center">Loading rankings...</div>';

                    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '3000' ? 'http://localhost:3000' : '';
                    try {
                        const res = await fetch(`${API_BASE}/api/user/leaderboard`);
                        const leaders = await res.json();

                        // Update Podium (Top 3)
                        if (leaders.length >= 3) {
                            podiumContainer.innerHTML = `
                            <div class="podium-item">
                                <i class="bi bi-person-circle avatar-icon"></i>
                                <div class="fw-bold small">${leaders[1].name}</div>
                                <div class="text-success small fw-bold">${leaders[1].points.total} Pts</div>
                                <div class="reward-tag shadow-sm">🥈 ₹500</div>
                                <div class="podium-block podium-2">2</div>
                            </div>
                            <div class="podium-item">
                                <i class="bi bi-person-circle avatar-icon text-warning" style="font-size: 4.5rem; text-shadow: 0 0 15px rgba(251,191,36,0.6);"></i>
                                <div class="fw-bold">👑 ${leaders[0].name}</div>
                                <div class="text-success small fw-bold">${leaders[0].points.total} Pts</div>
                                <div class="reward-tag shadow-sm">🥇 ₹1,000</div>
                                <div class="podium-block podium-1">1</div>
                            </div>
                            <div class="podium-item">
                                <i class="bi bi-person-circle avatar-icon"></i>
                                <div class="fw-bold small">${leaders[2].name}</div>
                                <div class="text-success small fw-bold">${leaders[2].points.total} Pts</div>
                                <div class="reward-tag shadow-sm">🥉 ₹250</div>
                                <div class="podium-block podium-3">3</div>
                            </div>
                        `;
                        }

                        // Update List (4 to 20)
                        let html = '';
                        for (let i = 3; i < leaders.length; i++) {
                            html += `
                            <div class="list-item">
                                <div class="fw-bold me-3 text-muted" style="width: 30px;">#${i + 1}</div>
                                <div class="flex-grow-1 d-flex align-items-center">
                                    <i class="bi bi-person-circle fs-4 me-2 opacity-25"></i>
                                    <span>${leaders[i].name}</span>
                                </div>
                                <div class="fw-bold text-success">${leaders[i].points.total} Pts</div>
                            </div>
                        `;
                        }
                        listContainer.innerHTML = html;

                        // Populate sticky footer with current user's rank
                        const userId = localStorage.getItem('userId');
                        if (userId) {
                            try {
                                const profileRes = await fetch(`${API_BASE}/api/user/profile/${userId}`);
                                const currentUser = await profileRes.json();
                                const rankIdx = leaders.findIndex(l => l._id === userId);
                                const rank = rankIdx >= 0 ? rankIdx + 1 : leaders.length + 1;
                                document.getElementById('userRankDisplay').innerText = `#${rank}`;
                                document.getElementById('userPointsDisplay').innerText = `${currentUser.points.total} Points`;
                            } catch (e) { console.error('Rank fetch error', e); }
                        }

                    } catch (e) {
                        console.error(e);
                        listContainer.innerHTML = '<div class="p-4 text-center text-danger">Failed to load leaderboard.</div>';
                    }
                });
            </script>
        </div>
    </div>

    <div class="user-rank-sticky">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <span class="fw-bold me-3" id="userRankDisplay">--</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png" width="30"
                    class="rounded-circle me-2">
                <span class="fw-bold">Your Current Rank</span>
            </div>
            <div class="fw-bold" id="userPointsDisplay">-- Points</div>
        </div>
    </div>

    <footer class="footer-dark text-center">
        <p class="small mb-0">&copy; 2026 SegriTrack India.</p>
    </footer>
</body>

</html>
