<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack | My Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
        }

        .back-btn {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--main-green);
        }

        /* Content Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .profile-img-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--main-green);
            margin-bottom: 15px;
        }

        .form-control:focus {
            border-color: var(--main-green);
            box-shadow: 0 0 0 0.25rem rgba(1, 243, 134, 0.25);
        }

        .btn-save {
            background: var(--dark-green);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            background: var(--main-green);
            color: var(--dark-green);
            transform: translateY(-2px);
        }

        .footer-dark {
            background: #002e21;
            color: #888;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark sticky-top py-3">
        <div class="container d-flex align-items-center">
            <a href="profile-more.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <span class="navbar-brand mb-0 fs-4">My Account</span>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 600px;">
        <div class="glass-card text-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png" alt="User Profile"
                class="profile-img-large shadow-sm">
            <div>
                <button class="btn btn-sm btn-outline-success rounded-pill fw-bold px-3">Change Photo</button>
            </div>
        </div>

        <div class="glass-card">
            <h5 class="fw-bold mb-4">Personal Information</h5>
            <form id="accountForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Full Name</label>
                    <input type="text" class="form-control rounded-3 py-2" id="userNameInput" value=""
                        placeholder="Loading...">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Email Address</label>
                    <input type="email" class="form-control rounded-3 py-2" id="userEmailInput" value=""
                        placeholder="Loading...">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text rounded-start-3 bg-light">+91</span>
                        <input type="tel" class="form-control rounded-end-3 py-2" value="9876543210">
                    </div>
                </div>

                <button type="button" class="btn btn-save w-100" onclick="alert('Changes Saved Successfully!')">Save
                    Changes</button>
            </form>
        </div>
    </div>

    <footer class="footer-dark text-center mt-5">
        <p class="small mb-0">&copy; 2026 SegriTrack India.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            if (userId) {
                try {
                    const res = await fetch(`/api/user/profile/${userId}`);
                    const user = await res.json();
                    document.getElementById('userNameInput').value = user.name;
                    document.getElementById('userEmailInput').value = user.email;
                } catch (e) {
                    console.error("Failed to load user data");
                }
            }
        });
    </script>
</body>

</html>
