<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack | Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
        }

        .back-btn {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--main-green);
        }

        .settings-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            margin-bottom: 25px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .item-icon {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--dark-green);
            margin-right: 15px;
        }

        .footer-dark {
            background: #002e21;
            color: #888;
            padding: 20px 0;
            margin-top: auto;
        }

        /* Toggle Switch */
        .form-check-input:checked {
            background-color: var(--main-green);
            border-color: var(--main-green);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark sticky-top py-3">
        <div class="container d-flex align-items-center">
            <a href="profile-more.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <span class="navbar-brand mb-0 fs-4">Security</span>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 600px;">

        <h6 class="fw-bold text-muted small mb-3 ps-2">LOGIN SECURITY</h6>
        <div class="settings-list">
            <div class="settings-item" onclick="alert('Change Password interface.')" style="cursor: pointer;">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-key"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Change Password</div>
                        <div class="small text-muted">Update your account password</div>
                    </div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
            <div class="settings-item">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-phone-vibrate"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Two-Factor Authentication</div>
                        <div class="small text-muted">Protect your account with an extra step</div>
                    </div>
                </div>
                <div class="form-check form-switch fs-5 mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" checked>
                </div>
            </div>
        </div>

        <h6 class="fw-bold text-muted small mb-3 ps-2 mt-4">DEVICES</h6>
        <div class="settings-list">
            <div class="settings-item" onclick="alert('Show managed devices.')" style="cursor: pointer;">
                <div class="d-flex align-items-center">
                    <div class="item-icon"><i class="bi bi-laptop"></i></div>
                    <div>
                        <div class="fw-bold text-dark">Manage Devices</div>
                        <div class="small text-muted">View devices logged into your account</div>
                    </div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
        </div>
    </div>

    <footer class="footer-dark text-center mt-5">
        <p class="small mb-0">&copy; 2026 SegriTrack India.</p>
    </footer>

</body>

</html>
