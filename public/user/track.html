<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack | Live Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        /* Navigation */
        .navbar {
            background: white !important;
            border-bottom: 1px solid #edf2f7;
        }

        .nav-link {
            color: #4a5568 !important;
            font-weight: 500;
        }

        .nav-link.active {
            color: var(--dark-green) !important;
            font-weight: 700;
            border-bottom: 2px solid var(--main-green);
        }

        .profile-circle-nav {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--main-green);
            margin-left: 10px;
            cursor: pointer;
        }

        /* Map Section */
        #map-container {
            height: 55vh;
            width: 100%;
            background: #e2e8f0;
            position: relative;
            border-radius: 0 0 25px 25px;
            overflow: hidden;
        }

        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
        }

        /* Info Card */
        .tracking-card {
            margin-top: 20px;
            position: relative;
            z-index: 100;
        }

        .info-box {
            background: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
        }

        .worker-avatar-icon {
            font-size: 3rem;
            color: #64748b;
            margin-right: 15px;
        }

        .eta-box {
            background: var(--dark-green);
            color: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 25px;
        }

        .step-item {
            text-align: center;
            z-index: 2;
            position: relative;
            background: white;
            width: 30px;
            font-size: 1.2rem;
        }

        .step-line {
            position: absolute;
            top: 15px;
            left: 0;
            height: 2px;
            background: #e2e8f0;
            width: 100%;
            z-index: 1;
        }

        .step-line-active {
            position: absolute;
            top: 15px;
            left: 0;
            height: 2px;
            background: var(--main-green);
            width: 65%;
            z-index: 1;
        }

        .footer-dark {
            background: #002e21;
            color: #888;
            padding: 40px 0;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg sticky-top py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success fs-3" href="home.html">🌱 SegriTrack</a>
            <div class="collapse navbar-collapse" id="dashNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="leaderboard.html">Leaderboard</a></li>
                    <li class="nav-item d-flex align-items-center">
                        <a class="nav-link" href="profile.html">Profile</a>
                        <a href="profile.html">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/YT_Profile_icon.png"
                                class="profile-circle-nav shadow-sm">
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="map-container">
        <div class="live-badge"><i class="bi bi-broadcast me-2"></i>LIVE TRACKING</div>
        <div id="map" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // CONFIGURATION: EDIT COORDINATES HERE
            // ==========================================
            const PICKUP_LOCATION = [9.127497, 76.715972];  // Manakala (User)
            const WORKER_LOCATION = [9.158186, 76.773261];  // Adoor (Worker Start)
            // ==========================================

            // Initialize Map
            const map = L.map('map').setView(PICKUP_LOCATION, 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Icons
            const userIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });

            const workerIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/16000/16000543.png', // Specific Green User Icon
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20]
            });

            // 1. Static Pin: Pickup Location (User)
            L.marker(PICKUP_LOCATION, { icon: userIcon }).addTo(map)
                .bindPopup("<b>Pickup Location</b><br>Manakala, Adoor").openPopup();

            // 2. Static Pin: Worker Location (Worker)
            const workerMarker = L.marker(WORKER_LOCATION, { icon: workerIcon }).addTo(map)
                .bindPopup("<b>Waste Collector</b><br>En Route");

            // 3. Routing (Actual Road Path)
            // This calculates the shortest path via roads using OSRM
            const routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(WORKER_LOCATION),
                    L.latLng(PICKUP_LOCATION)
                ],
                routeWhileDragging: false,
                draggableWaypoints: false,
                addWaypoints: false,
                createMarker: function () { return null; }, // Disable default markers (we use custom ones)
                lineOptions: {
                    styles: [{ color: '#004d37', opacity: 0.8, weight: 6 }] // Dark Green Path
                },
                show: false // Hide the list of turn-by-turn instructions
            }).addTo(map);

            // Hide the routing container box entirely
            routingControl.on('routesfound', function (e) {
                const routes = e.routes;
                const summary = routes[0].summary;

                // Calculate ETA in minutes (summary.totalTime is seconds)
                const timeMins = Math.ceil(summary.totalTime / 60);
                document.getElementById('etaValue').innerText = timeMins + " mins";

                // Keep the routing container hidden
                const container = document.querySelector('.leaflet-routing-container');
                if (container) container.style.display = 'none';
            });

            // Also force dragging to update the route if we were to allow it (we don't here)
            // NO MOVEMENT SIMULATION (As requested)
        });
    </script>

    <div class="container tracking-card">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="info-box">
                    <div class="row align-items-center">
                        <div class="col-8 col-md-9 d-flex align-items-center">
                            <i class="bi bi-person-circle worker-avatar-icon"></i>
                            <div>
                                <h5 class="fw-bold mb-0">Worker #2</h5>
                                <span class="badge bg-success-subtle text-success mt-1">On Schedule</span>
                                <div class="mt-1 small text-muted"><i class="bi bi-star-fill text-warning me-1"></i> 4.8
                                    Rating</div>
                            </div>
                        </div>
                        <div class="col-4 col-md-3">
                            <div class="eta-box shadow-sm">
                                <small class="d-block opacity-75">ETA</small>
                                <h3 class="fw-bold mb-0" id="etaValue">Calculating...</h3>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4 opacity-10">

                    <div class="row">
                        <div class="col-md-6 mb-3 mb-md-0 text-center text-md-start">
                            <p class="small text-muted mb-1 fw-bold">PICKUP ADDRESS</p>
                            <p class="mb-0">Civil Station, Manakala, Adoor, Kerala</p>
                        </div>
                        <div class="col-md-6 text-center text-md-end">
                            <button class="btn btn-outline-dark px-4 fw-bold rounded-3">
                                <i class="bi bi-chat-left-text me-2"></i> Message
                            </button>
                        </div>
                    </div>

                    <div class="step-indicator px-4 mt-4">
                        <div class="step-line"></div>
                        <div class="step-line-active"></div>
                        <div class="step-item text-success"><i class="bi bi-check-circle-fill"></i><br><small
                                class="text-muted" style="font-size: 0.6rem;">Confirmed</small></div>
                        <div class="step-item text-success"><i class="bi bi-truck"></i><br><small class="text-muted"
                                style="font-size: 0.6rem;">En Route</small></div>
                        <div class="step-item text-secondary"><i class="bi bi-geo-alt-fill"></i><br><small
                                class="text-muted" style="font-size: 0.6rem;">Nearby</small></div>
                        <div class="step-item text-secondary"><i class="bi bi-house-check"></i><br><small
                                class="text-muted" style="font-size: 0.6rem;">Arrived</small></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-dark text-center mt-5">
        <div class="container">
            <p class="mb-1">🌱 SegriTrack India - Clean. Segregate. Earn.</p>
            <p class="small mb-0">&copy; 2026. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
