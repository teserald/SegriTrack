<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegriTrack | Payment Method</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #01f386;
            --dark-green: #004d37;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: rgba(0, 77, 55, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
        }

        .back-btn {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--main-green);
        }

        /* Content */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            margin-bottom: 20px;
        }

        .credit-card {
            background: linear-gradient(135deg, #004d37, #019a55);
            color: white;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 77, 55, 0.3);
            margin-bottom: 20px;
        }

        .credit-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .card-number {
            font-size: 1.4rem;
            letter-spacing: 2px;
            font-family: monospace;
            margin: 20px 0;
        }

        .btn-add {
            background: #e2e8f0;
            color: #475569;
            border: 2px dashed #cbd5e1;
            font-weight: 600;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: #f8fafc;
            border-color: var(--main-green);
            color: var(--dark-green);
        }

        .footer-dark {
            background: #002e21;
            color: #888;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark sticky-top py-3">
        <div class="container d-flex align-items-center">
            <a href="profile-more.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <span class="navbar-brand mb-0 fs-4">Payment Method</span>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 600px;">
        <h5 class="fw-bold mb-4">Saved Cards</h5>

        <div class="credit-card">
            <div class="d-flex justify-content-between align-items-center">
                <i class="bi bi-credit-card fs-2"></i>
                <span class="fw-bold fst-italic">VISA</span>
            </div>
            <div class="card-number">**** **** **** 4242</div>
            <div class="d-flex justify-content-between align-items-end">
                <div>
                    <div class="small opacity-75" style="font-size: 0.7rem;">Card Holder</div>
                    <div class="fw-bold">PRIMARY USER</div>
                </div>
                <div>
                    <div class="small opacity-75" style="font-size: 0.7rem;">Expires</div>
                    <div class="fw-bold">12/28</div>
                </div>
            </div>
        </div>

        <div class="btn-add w-100" onclick="alert('Add Payment Method triggered.')">
            <i class="bi bi-plus-circle fs-4 mb-2 d-block"></i>
            Add New Payment Method
        </div>

        <div class="glass-card mt-5">
            <h6 class="fw-bold mb-3"><i class="bi bi-shield-check text-success me-2"></i> Secure Payments</h6>
            <p class="small text-muted mb-0">SegriTrack processes all payments securely. Your card information is
                encrypted and never stored on our local servers.</p>
        </div>
    </div>

    <footer class="footer-dark text-center mt-5">
        <p class="small mb-0">&copy; 2026 SegriTrack India.</p>
    </footer>

</body>

</html>
